<h1 id="page_title">Update a Task</h1>
<div class="container d-flex flex-column align-items-center justify-content-center min-vh-100">
    <div class="w-100"> 
        @if(tasksToShow().length > 0) {
            <div class="table-responsive shadow-sm">
                <table class="table table-striped table-hover table-bordered">
                    <thead class="table-dark text-center">
                        <tr>
                            <th scope="col">Task ID</th>
                            <th scope="col">Title</th>
                            <th scope="col">Description</th>
                            <th scope="col">Actions</th> </tr>
                    </thead>
                    <tbody class="align-middle">
                        @for (task of tasksToShow(); track task.id) {
                            <tr>
                                <th scope="row" class="text-center">{{ task.id }}</th>
                                <td>{{ task.title }}</td>
                                <td>{{ task.description }}</td>
                                <td class="text-center">
                                    <button class="btn btn-outline-primary btn-sm me-2" (click)="openUpdateModal(task)">
                                        <i class="bi bi-pencil"></i> Update
                                    </button>
                                </td>
                            </tr>
                        } 
                    </tbody>
                </table>
            </div>
        } @else {
            <div class="alert alert-info text-center w-50 mx-auto" role="alert">
                <i class="bi bi-info-circle me-2"></i>
                No tasks were found in localStorage.
            </div>
        }
    </div>
</div>

<div class="modal fade" #updateModal tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">Update Task</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form [formGroup]="updateForm">
          <div class="mb-3">
            <label class="form-label fw-bold">Title</label>
            <input type="text" class="form-control" formControlName="title">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Description</label>
            <textarea class="form-control" formControlName="description" rows="3"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" (click)="saveUpdate()" [disabled]="updateForm.invalid">Save Changes</button>
      </div>
    </div>
  </div>
</div>
