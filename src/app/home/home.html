<div class="d-flex flex-column align-items-center gap-2 home">
    @for (option of options; track option.title) {
      <a 
        class="btn btn-outline-dark btn-lg btn-block" 
        [routerLink]="option.route" 
        routerLinkActive="active">
        {{ option.title }}
      </a>
    }
</div>
